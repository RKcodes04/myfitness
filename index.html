<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Workout Flow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <div class="app-container">
        <header>
            <h1 id="today-title" class="today-title">ROUTINE</h1>
            <div id="flame-trigger" class="streak-flame">
                <span class="flame-icon">🔥</span> <span id="streak-count">0</span>
            </div>
        </header>

        <main class="content-area">
            <div id="exercise-view" class="active-view">
                <div id="exercise-image" class="exercise-image"></div>
                <p id="exercise-name" class="exercise-name">Ready?</p>
            </div>
            <div id="breathing-view" class="hidden">
                <div class="breathing-ring-container">
                    <div class="breathing-ring"></div>
                    <span class="breathing-text">BREATHE</span>
                </div>
            </div>
        </main>

        <footer class="control-bar">
            <div id="interaction-zone" class="interaction-zone">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="timer-display" class="timer-display">
                    <span id="timer-min" class="timer-min">00</span><span class="colon">:</span><span id="timer-sec" class="timer-sec">00</span>
                </div>
            </div>
            <button id="play-pause-btn" class="play-pause-btn">▶</button>
        </footer>
    </div>

    <div id="calendar-overlay" class="overlay hidden">
        <div class="modal calendar-modal">
            <span id="close-calendar" class="close-icon">&times;</span>
            <h2 id="calendar-month-year">Month Year</h2>
            <div class="calendar-header">
                <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
            </div>
            <div id="calendar-grid" class="calendar-grid-full"></div>
        </div>
    </div>

    <div id="admin-overlay" class="overlay hidden">
        <div class="modal admin-modal">
            <span id="close-admin" class="close-icon">&times;</span>
            <h2>Edit Routine</h2>
            
            <div class="admin-top-bar">
                <select id="routine-select" class="dropdown"></select>
                <div class="routine-add-row">
                    <input type="text" id="new-routine-name" placeholder="Routine Name">
                    <button id="add-routine-btn" class="btn-accent">New</button>
                </div>
            </div>

            <div id="admin-inputs" class="admin-list"></div>
            
            <div class="admin-actions-footer">
                <button id="add-exercise" class="btn-secondary">+ Add Exercise</button>
                <div class="btn-group">
                    <button id="save-routine" class="btn-primary">Save Changes</button>
                    <button id="delete-all" class="btn-danger">Wipe Data</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
