<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Workout Flow Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <div class="app-container">
        <header>
            <h1 id="today-title" class="today-title">WORKOUT</h1>
            <div id="flame-trigger" class="streak-flame" title="2-tap: calendar | 3-tap: theme">
                <span class="flame-icon">🔥</span>
                <span id="streak-count">0</span>
            </div>
        </header>

        <main class="content-area">
            <div id="exercise-view" class="view-panel">
                <div id="exercise-image" class="exercise-image"></div>
                <p id="exercise-name" class="exercise-name">Ready?</p>
                <p id="set-label" class="set-label"></p>
            </div>
            <div id="breathing-view" class="view-panel hidden">
                <div class="breathing-ring-container">
                    <div id="breathing-ring" class="breathing-ring"></div>
                    <div class="breathing-inner">
                        <span class="breathing-text">REST</span>
                        <span id="breathing-countdown" class="breathing-countdown">0</span>
                    </div>
                </div>
            </div>
            <div id="complete-view" class="view-panel hidden">
                <div class="complete-icon">💪</div>
                <p class="exercise-name">Session Complete!</p>
                <p class="set-label">Great work. Streak saved.</p>
            </div>
        </main>

        <footer class="control-bar">
            <!-- 2-tap = reset | 3-tap = toggle bar/timer mode -->
            <div id="interaction-zone" class="interaction-zone timer-mode">
                <div class="progress-track">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="timer-display" class="timer-display">
                    <span id="timer-min" class="timer-min">00</span>
                    <span class="colon">:</span>
                    <span id="timer-sec" class="timer-sec">00</span>
                </div>
            </div>
            <button id="play-pause-btn" class="play-pause-btn" aria-label="Play/Pause">▶</button>
        </footer>
    </div>

    <!-- Calendar Overlay -->
    <div id="calendar-overlay" class="overlay hidden">
        <div class="modal">
            <span id="close-calendar" class="close-icon" aria-label="Close">&times;</span>
            <h3 class="modal-title">Monthly Streak</h3>
            <div id="calendar-month-nav" class="calendar-month-nav">
                <button id="cal-prev" class="cal-nav-btn">‹</button>
                <span id="cal-month-label" class="cal-month-label"></span>
                <button id="cal-next" class="cal-nav-btn">›</button>
            </div>
            <div class="calendar-day-headers">
                <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <div class="streak-summary">
                <span>🔥 <strong id="total-streak">0</strong> day streak</span>
            </div>
        </div>
    </div>

    <!-- Admin Overlay -->
    <div id="admin-overlay" class="overlay hidden">
        <div class="modal modal-wide">
            <h2 class="modal-title">Edit Routines</h2>

            <!-- Routine (named workout day) selector -->
            <div class="routine-bar">
                <div id="routine-tabs" class="routine-tabs"></div>
                <button id="add-routine-btn" class="btn-icon" title="New Routine">＋</button>
            </div>

            <!-- Grid header -->
            <div class="entry-grid-header">
                <span>Exercise</span>
                <span>Duration (s)</span>
                <span>Rest (s)</span>
                <span>Image URL</span>
                <span></span>
            </div>

            <div id="admin-inputs" class="admin-scroll-area"></div>

            <div class="modal-actions">
                <button id="add-exercise" class="btn-secondary">+ Add Exercise</button>
                <div class="modal-actions-right">
                    <button id="delete-all-data" class="btn-danger">🗑 Reset All</button>
                    <button id="close-admin" class="btn-ghost">Cancel</button>
                    <button id="save-routine" class="btn-primary">Save & Reload</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
